{% extends "base.html" %}

{% block title %}Вхід{% endblock %}

{% block content %}
<div class="container py-4" style="max-width: 560px;">
  <h1 class="mb-4">Вхід</h1>

  <form method="post" class="card card-body">
    {% csrf_token %}
    {% if form.non_field_errors %}
      <div class="alert alert-danger">{{ form.non_field_errors }}</div>
    {% endif %}

    <div class="mb-3">
      <label class="form-label" for="id_username">Логін</label>
      <input type="text" name="username" autofocus required class="form-control" id="id_username">
    </div>

    <div class="mb-3">
      <label class="form-label" for="id_password">Пароль</label>
      <input type="password" name="password" required class="form-control" id="id_password">
    </div>

    {% if next %}
      <input type="hidden" name="next" value="{{ next }}">
    {% endif %}

    <button class="btn btn-primary" type="submit">Увійти</button>
  </form>

  <p class="mt-3 mb-0">
    Немає акаунта? <a href="{% url 'register' %}">Зареєструватися</a>
  </p>
</div>
{% endblock %}
